<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mengyuan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #fafafa;
    color: #333;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .container {
    max-width: 600px;
    width: 100%;
    padding: 80px 24px;
  }

  .avatar {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #e8e8e8;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .bio {
    color: #888;
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 40px;
  }

  .projects {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.15s ease;
  }

  .card:hover {
    border-color: #ccc;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    transform: translateY(-1px);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .card-info h3 {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .card-info p {
    font-size: 13px;
    color: #999;
  }

  .card-arrow {
    margin-left: auto;
    color: #ccc;
    font-size: 16px;
  }

  .footer {
    margin-top: 60px;
    font-size: 13px;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="container">
  <div class="avatar">🧩</div>
  <h1>Mengyuan</h1>
  <p class="bio">写点小东西，做点小工具。专注 AI + 开发，持续折腾中。</p>

  <div class="projects">
    <a href="minesweeper.html" class="card">
      <div class="card-icon">💣</div>
      <div class="card-info">
        <h3>扫雷</h3>
        <p>经典扫雷游戏，三种难度，网页即玩</p>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>

  <div class="footer">© 2026 Mengyuan</div>
</div>
</body>
</html>
