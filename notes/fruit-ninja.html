<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>水果忍者</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// roundRect polyfill
if (!ctx.roundRect) {
  ctx.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    ctx.beginPath();
    ctx.moveTo(x + r.tl, y);
    ctx.lineTo(x + w - r.tr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    ctx.lineTo(x + w, y + h - r.br);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    ctx.lineTo(x + r.bl, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    ctx.lineTo(x, y + r.tl);
    ctx.quadraticCurveTo(x, y, x + r.tl, y);
    ctx.closePath();
  };
}

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── Audio ──────────────────────────────
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq, duration, type = 'sine', vol = 0.08) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function sfxSlice() { playBeep(800, 0.1, 'square', 0.06); }
function sfxCombo(n) { playBeep(600 + n * 100, 0.15, 'square', 0.07); }
function sfxBomb() { playBeep(60, 0.4, 'sawtooth', 0.15); playBeep(40, 0.5, 'triangle', 0.12); }
function sfxLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playBeep(f, 0.2, 'sine', 0.08), i * 100));
}
function sfxGameOver() {
  [400, 350, 300, 200].forEach((f, i) => setTimeout(() => playBeep(f, 0.3, 'triangle', 0.08), i * 150));
}

// ─── Fruit Definitions ────────────────
const FRUIT_TYPES = [
  { emoji: '🍎', color: '#ff3b30', juice: '#ff6b6b' },
  { emoji: '🍊', color: '#ff9500', juice: '#ffb74d' },
  { emoji: '🍋', color: '#ffcc00', juice: '#ffe082' },
  { emoji: '🍉', color: '#4cd964', juice: '#ff4757' },
  { emoji: '🍇', color: '#af52de', juice: '#cf7bff' },
  { emoji: '🍌', color: '#ffe620', juice: '#fff9c4' },
  { emoji: '🥝', color: '#7ac043', juice: '#a5d6a7' },
  { emoji: '🍑', color: '#ffb39c', juice: '#ffccbc' },
  { emoji: '🍍', color: '#c8960c', juice: '#ffe082' },
  { emoji: '🍓', color: '#ff2d55', juice: '#ff6b81' },
];

// ─── State ────────────────────────────
const S = {
  screen: 'menu', // menu | playing | endless | levelDone | gameOver
  score: 0,
  bestEndless: 0,
  lives: 3,
  level: 1,
  combo: 0,
  maxCombo: 0,
  objects: [],
  particles: [],
  halves: [],
  popups: [],
  blade: [],          // {x, y, t}
  isTouching: false,
  shakeX: 0,
  shakeY: 0,
  shakeDur: 0,
  spawnTimer: 0,
  spawnWait: 0,
  waveCount: 0,
  levelTarget: 0,
  bombChance: 0,
  bgStars: [],
  comboChain: false,
  chainTimer: 0,
};

// ─── Helpers ──────────────────────────
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

function ptSegDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = clamp(t, 0, 1);
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function initBgStars() {
  S.bgStars = [];
  for (let i = 0; i < 100; i++) {
    S.bgStars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.5, speed: Math.random() * 0.3 + 0.1 });
  }
}

// ─── Object Spawning ──────────────────
function spawnWave() {
  if (S.screen !== 'playing' && S.screen !== 'endless') return;
  const count = randInt(1, Math.min(5, 1 + Math.floor(S.level / 2)));
  for (let i = 0; i < count; i++) {
    const isBomb = Math.random() < S.bombChance;
    const x = rand(W * 0.1, W * 0.9);
    const vy = rand(-H * 1.2, -H * 0.7);
    const vx = rand(-80, 80);
    if (isBomb) {
      S.objects.push({
        type: 'bomb', x, y: H + 40, vx, vy,
        r: Math.min(36, W * 0.045), rotation: 0, rotSpeed: rand(-3, 3),
      });
    } else {
      const ft = FRUIT_TYPES[randInt(0, FRUIT_TYPES.length - 1)];
      S.objects.push({
        type: 'fruit', x, y: H + 40, vx, vy,
        r: Math.min(32, W * 0.04), rotation: 0, rotSpeed: rand(-3, 3),
        emoji: ft.emoji, color: ft.color, juice: ft.juice,
      });
    }
  }
}

// ─── Particle / Popup ─────────────────
function burstJuice(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(100, 400);
    S.particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: rand(0.3, 0.8), maxLife: 0.8, color, size: rand(3, 8),
    });
  }
}

function burstBomb(x, y) {
  for (let i = 0; i < 25; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(150, 500);
    S.particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: rand(0.4, 1.0), maxLife: 1.0, color: rand(0,1) < 0.5 ? '#ff4444' : '#ff8800', size: rand(4, 12),
    });
  }
}

function addPopup(x, y, text, color) {
  S.popups.push({ x, y, text, color, life: 0.8, maxLife: 0.8, vy: -120 });
}

function spawnHalves(x, y, emoji, color) {
  const angle = rand(-0.3, 0.3) - Math.PI / 2;
  S.halves.push({ x, y, vx: Math.cos(angle) * 150, vy: Math.sin(angle) * 150 - 80, emoji, color, half: 'left', rotation: 0, rotSpeed: rand(-5, -2), life: 0.7, maxLife: 0.7 });
  S.halves.push({ x, y, vx: Math.cos(angle + Math.PI) * 150, vy: Math.sin(angle + Math.PI) * 150 - 80, emoji, color, half: 'right', rotation: 0, rotSpeed: rand(2, 5), life: 0.7, maxLife: 0.7 });
}

// ─── Start Game ───────────────────────
function startLevels() {
  initAudio();
  S.screen = 'playing';
  S.score = 0;
  S.lives = 3;
  S.level = 1;
  S.combo = 0;
  S.maxCombo = 0;
  S.objects = [];
  S.particles = [];
  S.halves = [];
  S.popups = [];
  S.blade = [];
  S.shakeDur = 0;
  S.comboChain = false;
  S.chainTimer = 0;
  S.levelTarget = 80;
  S.bombChance = 0.12;
  S.spawnTimer = 0;
  S.spawnWait = 0.6;
  S.waveCount = 0;
  resize();
  initBgStars();
}

function startEndless() {
  initAudio();
  S.screen = 'endless';
  S.score = 0;
  S.lives = 3;
  S.level = 1;
  S.combo = 0;
  S.maxCombo = 0;
  S.objects = [];
  S.particles = [];
  S.halves = [];
  S.popups = [];
  S.blade = [];
  S.shakeDur = 0;
  S.comboChain = false;
  S.chainTimer = 0;
  S.bombChance = 0.08;
  S.spawnTimer = 0;
  S.spawnWait = 0.8;
  S.waveCount = 0;
  resize();
  initBgStars();
  const saved = localStorage.getItem('fn_best_endless');
  S.bestEndless = saved ? parseInt(saved) : 0;
}

function nextLevel() {
  S.level++;
  S.lives = Math.min(S.lives + 1, 3);
  S.objects = [];
  S.particles = [];
  S.halves = [];
  S.popups = [];
  S.blade = [];
  S.shakeDur = 0;
  S.combo = 0;
  S.comboChain = false;
  S.chainTimer = 0;
  S.levelTarget = Math.floor(S.levelTarget * 1.5);
  S.bombChance = Math.min(0.12 + S.level * 0.04, 0.45);
  S.spawnWait = Math.max(0.35, 0.8 - S.level * 0.05);
  S.waveCount = 0;
  S.screen = 'playing';
  initBgStars();
}

// ─── Slice Logic ──────────────────────
function sliceObject(obj, bladePt) {
  if (obj.type === 'fruit') {
    S.combo++;
    if (S.combo > S.maxCombo) S.maxCombo = S.combo;
    const pts = S.combo;
    S.score += pts;
    burstJuice(obj.x, obj.y, obj.juice, 12);
    spawnHalves(obj.x, obj.y, obj.emoji, obj.color);
    addPopup(obj.x, obj.y, pts > 1 ? `+${pts} x${S.combo}` : '+1', obj.color);
    if (S.combo >= 3) sfxCombo(Math.min(S.combo, 8));
    else sfxSlice();
    S.chainTimer = 0.4;
    S.comboChain = true;
  } else if (obj.type === 'bomb') {
    S.lives--;
    S.shakeDur = 0.3;
    burstBomb(obj.x, obj.y);
    addPopup(obj.x, obj.y, '💥', '#ff0000');
    sfxBomb();
    S.combo = 0;
    S.comboChain = false;
  }
}

// ─── Update ───────────────────────────
function update(dt) {
  dt = Math.min(dt, 0.1);
  const active = S.screen === 'playing' || S.screen === 'endless';

  // Shake
  if (S.shakeDur > 0) {
    S.shakeDur -= dt;
    const intensity = S.shakeDur * 30;
    S.shakeX = (Math.random() - 0.5) * intensity;
    S.shakeY = (Math.random() - 0.5) * intensity;
  } else {
    S.shakeX = 0;
    S.shakeY = 0;
  }

  // Combo chain timer
  if (S.comboChain) {
    S.chainTimer -= dt;
    if (S.chainTimer <= 0) {
      S.combo = 0;
      S.comboChain = false;
    }
  }

  // Spawning
  if (active) {
    S.spawnTimer -= dt;
    if (S.spawnTimer <= 0) {
      S.spawnTimer = S.spawnWait + rand(-0.15, 0.15);
      spawnWave();
      S.waveCount++;
      if (S.screen === 'endless') {
        S.bombChance = Math.min(0.08 + S.waveCount * 0.003, 0.5);
        S.spawnWait = Math.max(0.25, 0.8 - S.waveCount * 0.008);
      }
    }
  }

  // Prune old blade points
  const now = performance.now() / 1000;
  S.blade = S.blade.filter(p => now - p.t < 0.12);

  // Collision: blade vs objects (only when active)
  if (active) {
    const toRemove = [];
    for (let i = S.objects.length - 1; i >= 0; i--) {
      const obj = S.objects[i];
      let hit = false;
      for (let j = 1; j < S.blade.length; j++) {
        const a = S.blade[j - 1], b = S.blade[j];
        const d = ptSegDist(obj.x, obj.y, a.x, a.y, b.x, b.y);
        if (d < obj.r * 1.1) {
          hit = true;
          sliceObject(obj, { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
          break;
        }
      }
      if (hit) toRemove.push(i);
    }
    for (const i of toRemove) S.objects.splice(i, 1);
  }

  // Update objects
  const gravity = H * 1.3;
  for (let i = S.objects.length - 1; i >= 0; i--) {
    const obj = S.objects[i];
    obj.vy += gravity * dt;
    obj.x += obj.vx * dt;
    obj.y += obj.vy * dt;
    obj.rotation += obj.rotSpeed * dt;
    if (obj.y > H + 100) S.objects.splice(i, 1);
  }

  // Update halves
  for (let i = S.halves.length - 1; i >= 0; i--) {
    const h = S.halves[i];
    h.vy += gravity * dt;
    h.x += h.vx * dt;
    h.y += h.vy * dt;
    h.rotation += h.rotSpeed * dt;
    h.life -= dt;
    if (h.life <= 0) S.halves.splice(i, 1);
  }

  // Update particles
  for (let i = S.particles.length - 1; i >= 0; i--) {
    const p = S.particles[i];
    p.vy += gravity * 0.7 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) S.particles.splice(i, 1);
  }

  // Update popups
  for (let i = S.popups.length - 1; i >= 0; i--) {
    const p = S.popups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) S.popups.splice(i, 1);
  }

  // Level check
  if (S.screen === 'playing' && S.score >= S.levelTarget) {
    S.screen = 'levelDone';
    sfxLevelUp();
  }

  // Game over check
  if ((S.screen === 'playing' || S.screen === 'endless') && S.lives <= 0) {
    S.screen = 'gameOver';
    sfxGameOver();
    if (S.bestEndless < S.score) {
      S.bestEndless = S.score;
      localStorage.setItem('fn_best_endless', S.score);
    }
  }

  // Background stars
  for (const star of S.bgStars) {
    star.y += star.speed;
    if (star.y > H + 5) { star.y = -5; star.x = Math.random() * W; }
  }
}

// ─── Render ───────────────────────────
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0a1628');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const star of S.bgStars) {
    const alpha = 0.3 + Math.sin(performance.now() / 2000 + star.x) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBlade() {
  if (S.blade.length < 2) return;
  const now = performance.now() / 1000;
  for (let i = 1; i < S.blade.length; i++) {
    const a = S.blade[i - 1], b = S.blade[i];
    const age = (now - b.t) / 0.12;
    if (age >= 1) continue;
    const alpha = 1 - age;
    const width = 5 * alpha + 1;
    ctx.strokeStyle = `rgba(220,240,255,${alpha * 0.9})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.shadowColor = `rgba(200,220,255,${alpha * 0.7})`;
    ctx.shadowBlur = 12 * alpha;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Inner bright line
    if (width > 2) {
      ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
      ctx.lineWidth = width * 0.4;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
  }
}

function drawObject(obj) {
  ctx.save();
  ctx.translate(obj.x, obj.y);
  ctx.rotate(obj.rotation);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.arc(2, 2, obj.r, 0, Math.PI * 2);
  ctx.fill();

  if (obj.type === 'bomb') {
    // Bomb body
    const grad = ctx.createRadialGradient(-obj.r*0.2, -obj.r*0.2, obj.r*0.1, 0, 0, obj.r);
    grad.addColorStop(0, '#444');
    grad.addColorStop(0.7, '#1a1a1a');
    grad.addColorStop(1, '#000');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, obj.r, 0, Math.PI * 2);
    ctx.fill();
    // Fuse
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(obj.r * 0.5, -obj.r * 0.7);
    ctx.quadraticCurveTo(obj.r * 0.8, -obj.r * 1.3, obj.r * 0.2, -obj.r * 1.1);
    ctx.stroke();
    // Spark
    const sparkAlpha = 0.5 + Math.sin(performance.now() / 100) * 0.5;
    ctx.fillStyle = `rgba(255,200,50,${sparkAlpha})`;
    ctx.beginPath();
    ctx.arc(obj.r * 0.2, -obj.r * 1.1, 5, 0, Math.PI * 2);
    ctx.fill();
    // Skull icon
    ctx.fillStyle = '#fff';
    ctx.font = `${obj.r * 1.2}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💣', 0, 1);
  } else {
    // Fruit body glow
    const grad = ctx.createRadialGradient(-obj.r*0.2, -obj.r*0.2, obj.r*0.1, 0, 0, obj.r);
    grad.addColorStop(0, obj.color);
    grad.addColorStop(1, 'rgba(0,0,0,0.3)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, obj.r, 0, Math.PI * 2);
    ctx.fill();

    // Emoji
    ctx.font = `${obj.r * 1.5}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(obj.emoji, 0, 1);
  }

  ctx.restore();
}

function drawHalf(h) {
  ctx.save();
  ctx.translate(h.x, h.y);
  ctx.rotate(h.rotation);
  const alpha = Math.max(0, h.life / h.maxLife);
  ctx.globalAlpha = alpha;

  ctx.fillStyle = h.color;
  ctx.beginPath();
  if (h.half === 'left') {
    ctx.arc(0, 0, 14, Math.PI * 0.5, Math.PI * 1.5);
  } else {
    ctx.arc(0, 0, 14, Math.PI * 1.5, Math.PI * 0.5);
  }
  ctx.fill();

  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const ox = h.half === 'left' ? -4 : 4;
  ctx.fillText(h.emoji, ox, 0);

  ctx.restore();
}

function drawHUD() {
  const pad = 16;
  const fs = Math.max(16, W * 0.025);

  // Score background
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.roundRect(pad, pad, 160, 44, 10);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fs}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(`得分: ${S.score}`, pad + 10, pad + 8);

  if (S.screen === 'playing') {
    ctx.fillText(`目标: ${S.levelTarget}`, pad + 10, pad + 26);
  }

  // Level
  if (S.screen === 'playing') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(W / 2 - 40, pad, 80, 30, 10);
    ctx.fill();
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${fs}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`第 ${S.level} 关`, W / 2, pad + 6);
  } else if (S.screen === 'endless') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(W / 2 - 50, pad, 100, 30, 10);
    ctx.fill();
    ctx.fillStyle = '#ff6b6b';
    ctx.font = `bold ${fs}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('无尽模式', W / 2, pad + 6);
  }

  // Lives (hearts)
  const heartSize = Math.max(20, W * 0.032);
  for (let i = 0; i < 3; i++) {
    ctx.font = `${heartSize}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(i < S.lives ? '❤️' : '🖤', W - pad - (2 - i) * (heartSize + 8), pad + 6);
  }

  // Combo display
  if (S.comboChain && S.combo >= 2) {
    const comboAlpha = clamp(S.chainTimer / 0.2, 0, 1);
    ctx.fillStyle = `rgba(255,215,0,${comboAlpha})`;
    ctx.font = `bold ${fs * 1.4}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`${S.combo} 连击!`, W / 2, pad + 50);
  }

  // Best score (endless)
  if (S.screen === 'endless') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(W - 130, pad + 50, 120, 24, 8);
    ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.font = `${fs * 0.7}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`最高: ${S.bestEndless}`, W - pad - 6, pad + 54);
  }
}

function drawPopups() {
  for (const p of S.popups) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    const scale = 1 + (1 - alpha) * 0.3;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = `bold ${Math.max(18, W * 0.04)}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.text, 0, 0);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of S.particles) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ─── Screens ──────────────────────────
function drawMenu() {
  drawBg();
  ctx.fillStyle = '#fff';
  const titleSize = Math.max(36, W * 0.07);
  ctx.font = `bold ${titleSize}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🍉 水果忍者 🍉', W / 2, H * 0.25);

  ctx.fillStyle = '#ccc';
  const subSize = Math.max(14, W * 0.025);
  ctx.font = `${subSize}px "Segoe UI", sans-serif`;
  ctx.fillText('滑动屏幕切水果，小心炸弹！', W / 2, H * 0.25 + titleSize * 1.2);

  const btns = [
    { text: '🎮 闯关模式', y: 0.48, action: startLevels, desc: '逐关挑战，难度递增' },
    { text: '♾️ 无尽模式', y: 0.58, action: startEndless, desc: '三滴血，看你能走多远' },
  ];

  for (const btn of btns) {
    const bw = Math.min(280, W * 0.6);
    const bh = 56;
    const bx = W / 2 - bw / 2;
    const by = H * btn.y;

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 16);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(18, W * 0.033)}px "Segoe UI", sans-serif`;
    ctx.fillText(btn.text, W / 2, by + 22);

    ctx.fillStyle = '#888';
    ctx.font = `${Math.max(12, W * 0.022)}px "Segoe UI", sans-serif`;
    ctx.fillText(btn.desc, W / 2, by + 42);
  }
}

function drawLevelDone() {
  drawBg();
  ctx.fillStyle = '#ffd700';
  const ts = Math.max(30, W * 0.06);
  ctx.font = `bold ${ts}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🎉 恭喜过关！', W / 2, H * 0.3);

  ctx.fillStyle = '#fff';
  const ss = Math.max(16, W * 0.03);
  ctx.font = `${ss}px "Segoe UI", sans-serif`;
  ctx.fillText(`第 ${S.level} 关完成`, W / 2, H * 0.3 + ts);
  ctx.fillText(`得分: ${S.score}  |  最大连击: ${S.maxCombo}`, W / 2, H * 0.3 + ts + ss * 1.5);

  ctx.fillStyle = '#ccc';
  ctx.font = `${ss * 0.9}px "Segoe UI", sans-serif`;
  ctx.fillText(`下一关: 目标 ${S.levelTarget} 分  |  炸弹频率 +↑`, W / 2, H * 0.3 + ts + ss * 2.8);

  const bw = Math.min(240, W * 0.5), bh = 50;
  const bx = W / 2 - bw / 2, by = H * 0.62;
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 14);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(16, W * 0.028)}px "Segoe UI", sans-serif`;
  ctx.fillText('▶ 继续下一关', W / 2, by + 33);
}

function drawGameOver() {
  drawBg();
  ctx.fillStyle = '#ff4444';
  const ts = Math.max(30, W * 0.06);
  ctx.font = `bold ${ts}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('💔 游戏结束', W / 2, H * 0.28);

  ctx.fillStyle = '#fff';
  const ss = Math.max(16, W * 0.03);
  ctx.font = `${ss}px "Segoe UI", sans-serif`;
  ctx.fillText(`最终得分: ${S.score}  |  最高连击: ${S.maxCombo}`, W / 2, H * 0.28 + ts);

  if (S.score > S.bestEndless && S.bestEndless > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${ss}px "Segoe UI", sans-serif`;
    ctx.fillText('🏆 新最高分！', W / 2, H * 0.28 + ts + ss * 1.3);
  }

  const btns = [
    { text: '🔄 再来一局', y: 0.50, action: startLevels, desc: '闯关模式' },
    { text: '♾️ 无尽模式', y: 0.60, action: startEndless, desc: '挑战高分' },
    { text: '🏠 返回主页', y: 0.70, action: () => { S.screen = 'menu'; }, desc: '' },
  ];

  for (const btn of btns) {
    const bw = Math.min(260, W * 0.55), bh = 48;
    const bx = W / 2 - bw / 2, by = H * btn.y;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 14);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(16, W * 0.028)}px "Segoe UI", sans-serif`;
    ctx.fillText(btn.text, W / 2, by + 20);
    if (btn.desc) {
      ctx.fillStyle = '#888';
      ctx.font = `${Math.max(11, W * 0.02)}px "Segoe UI", sans-serif`;
      ctx.fillText(btn.desc, W / 2, by + 38);
    }
  }
}

// ─── Input ────────────────────────────
function addBladePoint(x, y) {
  S.blade.push({ x, y, t: performance.now() / 1000 });
  if (S.blade.length > 40) S.blade.shift();
}

function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

let touchHandled = false;

canvas.addEventListener('mousedown', e => {
  if (touchHandled) return;
  S.isTouching = true;
  addBladePoint(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', e => {
  if (!S.isTouching || touchHandled) return;
  addBladePoint(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => { S.isTouching = false; });
canvas.addEventListener('mouseleave', () => { S.isTouching = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchHandled = true;
  initAudio();
  S.isTouching = true;
  const p = getPos(e);
  addBladePoint(p.x, p.y);
  handleClick(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!S.isTouching) return;
  const p = getPos(e);
  addBladePoint(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  S.isTouching = false;
  setTimeout(() => { touchHandled = false; }, 300);
});
canvas.addEventListener('touchcancel', () => {
  S.isTouching = false;
  setTimeout(() => { touchHandled = false; }, 300);
});

canvas.addEventListener('click', e => {
  if (touchHandled) return;
  handleClick(e.clientX, e.clientY);
});

function handleClick(x, y) {
  if (S.screen === 'menu') {
    const bw = Math.min(280, W * 0.6), bh = 56;
    const bx = W / 2 - bw / 2;
    const by1 = H * 0.48, by2 = H * 0.58;
    if (x >= bx && x <= bx + bw && y >= by1 && y <= by1 + bh) startLevels();
    if (x >= bx && x <= bx + bw && y >= by2 && y <= by2 + bh) startEndless();
  } else if (S.screen === 'levelDone') {
    const bw = Math.min(240, W * 0.5), bh = 50;
    const bx = W / 2 - bw / 2, by = H * 0.62;
    if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) nextLevel();
  } else if (S.screen === 'gameOver') {
    const tryBtns = [
      { y: 0.48, action: startLevels },
      { y: 0.58, action: startEndless },
      { y: 0.68, action: () => { S.screen = 'menu'; } },
    ];
    for (const btn of tryBtns) {
      const bw = Math.min(260, W * 0.55), bh = 48;
      const bx = W / 2 - bw / 2, by = H * btn.y;
      if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) { btn.action(); return; }
    }
  }
}

// ─── Game Loop ────────────────────────
let lastTime = performance.now();

function gameLoop(time) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  update(dt);

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(S.shakeX, S.shakeY);

  drawBg();

  // Draw halves (behind objects)
  for (const h of S.halves) drawHalf(h);

  // Draw objects
  for (const obj of S.objects) drawObject(obj);

  // Draw blade
  if (S.isTouching) drawBlade();

  // Draw effects
  drawParticles();
  drawPopups();
  drawHUD();

  ctx.restore();

  // Overlay screens
  if (S.screen === 'menu') drawMenu();
  if (S.screen === 'levelDone') drawLevelDone();
  if (S.screen === 'gameOver') drawGameOver();

  requestAnimationFrame(gameLoop);
}

// ─── Init ─────────────────────────────
initBgStars();
resize();
requestAnimationFrame(gameLoop);
</script>
