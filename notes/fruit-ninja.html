<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>水果忍者</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  overflow: hidden;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// roundRect polyfill
if (!ctx.roundRect) {
  ctx.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    ctx.beginPath();
    ctx.moveTo(x + r.tl, y);
    ctx.lineTo(x + w - r.tr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    ctx.lineTo(x + w, y + h - r.br);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    ctx.lineTo(x + r.bl, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    ctx.lineTo(x, y + r.tl);
    ctx.quadraticCurveTo(x, y, x + r.tl, y);
    ctx.closePath();
  };
}

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── Audio ──────────────────────────────
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playBeep(freq, duration, type = 'sine', vol = 0.08) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}

function sfxSlice() { playBeep(800, 0.1, 'square', 0.06); }
function sfxCombo(n) { playBeep(600 + n * 100, 0.15, 'square', 0.07); }
function sfxBomb() { playBeep(60, 0.4, 'sawtooth', 0.15); playBeep(40, 0.5, 'triangle', 0.12); }
function sfxLevelUp() {
  [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playBeep(f, 0.2, 'sine', 0.08), i * 100));
}
function sfxGameOver() {
  [400, 350, 300, 200].forEach((f, i) => setTimeout(() => playBeep(f, 0.3, 'triangle', 0.08), i * 150));
}

// ─── Fruit Drawing ──────────────────
// Shared helpers
function sphereGrad(ctx, r, base, light, dark, cx, cy) {
  const g = ctx.createRadialGradient(cx||-r*0.3, cy||-r*0.35, r*0.02, 0, 0, r);
  g.addColorStop(0, light); g.addColorStop(0.4, base); g.addColorStop(1, dark);
  return g;
}
function specular(ctx, r, x, y, s) {
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(x||-r*0.25, y||-r*0.3, s||r*0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath(); ctx.arc(x||-r*0.25, y||-r*0.3, s||r*0.1, 0, Math.PI*2); ctx.fill();
}
function drawCircle(ctx, r) { ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); }

const FRUITS = [
  { // 0 Apple
    color: '#d63031', flesh: '#f5f0c8', juice: '#e8302a',
    draw(ctx, r) {
      ctx.fillStyle = sphereGrad(ctx, r, '#e8453b', '#ff6b5b', '#8b0000');
      drawCircle(ctx, r); ctx.fill();
      specular(ctx, r);
      // Stem indent
      ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.beginPath();
      ctx.ellipse(0, -r*0.78, r*0.18, r*0.07, 0, 0, Math.PI*2); ctx.fill();
      // Stem
      ctx.strokeStyle = '#4a3020'; ctx.lineWidth = r*0.06; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(0, -r*0.8); ctx.quadraticCurveTo(r*0.1, -r*1.0, r*0.22, -r*1.08); ctx.stroke();
      // Leaf
      ctx.fillStyle = '#3cb043'; ctx.beginPath();
      ctx.ellipse(r*0.15, -r*0.95, r*0.28, r*0.1, 0.5, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2a8030'; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(r*0.05, -r*0.92); ctx.lineTo(r*0.3, -r*0.98); ctx.stroke();
    },
    drawCut(ctx, r, side) {
      const s = side === 'left' ? 1 : -1;
      ctx.fillStyle = sphereGrad(ctx, r, '#d63031', '#e8453b', '#7a0000');
      ctx.beginPath(); ctx.arc(0,0,r, Math.PI*0.5, Math.PI*1.5, side==='right'); ctx.fill();
      // Flesh gradient
      const fg = ctx.createLinearGradient(s*r*0.85, 0, s*r*0.55, 0);
      fg.addColorStop(0, '#f5f0c8'); fg.addColorStop(0.5, '#fffef5'); fg.addColorStop(1, '#e8dda0');
      ctx.fillStyle = fg;
      ctx.fillRect(s*r*0.6, -r*0.88, r*0.35, r*1.76);
      // Core line
      ctx.fillStyle = '#e0d5a0'; ctx.fillRect(s*r*0.55, -r*0.06, r*0.15, r*0.12);
      // Seeds
      ctx.fillStyle = '#4a3020';
      ctx.beginPath(); ctx.ellipse(s*r*0.5, -r*0.22, r*0.06, r*0.09, 0.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(s*r*0.48, r*0.18, r*0.06, r*0.09, -0.2, 0, Math.PI*2); ctx.fill();
    }
  },
  { // 1 Orange
    color: '#e67e22', flesh: '#ffb347', juice: '#ff9500',
    draw(ctx, r) {
      ctx.fillStyle = sphereGrad(ctx, r, '#f08c30', '#ffaa44', '#b85e0c');
      drawCircle(ctx, r); ctx.fill();
      // Texture dots
      for (let i=0; i<25; i++) {
        const a=rand(0,Math.PI*2), d=rand(r*0.3,r*0.88);
        ctx.fillStyle = `rgba(200,100,20,${rand(0.05,0.15)})`;
        ctx.beginPath(); ctx.arc(Math.cos(a)*d, Math.sin(a)*d, r*0.03, 0, Math.PI*2); ctx.fill();
      }
      specular(ctx, r);
      // Navel
      ctx.fillStyle = '#9c4a0a'; ctx.beginPath(); ctx.arc(0, -r*0.72, r*0.09, 0, Math.PI*2); ctx.fill();
    },
    drawCut(ctx, r, side) {
      const s = side==='left'?1:-1;
      ctx.fillStyle = sphereGrad(ctx, r, '#e67e22', '#f08c30', '#9c4a0a');
      ctx.beginPath(); ctx.arc(0,0,r, Math.PI*0.5, Math.PI*1.5, side==='right'); ctx.fill();
      // White pith
      ctx.fillStyle = '#fef9f0'; ctx.fillRect(s*r*0.72, -r*0.88, r*0.1, r*1.76);
      // Flesh
      const fg = ctx.createLinearGradient(s*r*0.68,0,s*r*0.1,0);
      fg.addColorStop(0,'#ffb347'); fg.addColorStop(1,'#ffe0b2');
      ctx.fillStyle = fg; ctx.fillRect(s*r*0.3, -r*0.85, r*0.42, r*1.7);
      // Segment lines
      for (let i=-3; i<=3; i++) {
        ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(s*r*0.1, i*r*0.22); ctx.lineTo(s*r*0.68, i*r*0.35); ctx.stroke();
      }
      // Center pith
      ctx.fillStyle = '#fef9f0'; ctx.beginPath(); ctx.arc(s*r*0.25, 0, r*0.1, 0, Math.PI*2); ctx.fill();
    }
  },
  { // 2 Watermelon
    color: '#217a3d', flesh: '#e8302a', juice: '#ff4757',
    draw(ctx, r) {
      ctx.fillStyle = sphereGrad(ctx, r, '#2d8c4a', '#3aa855', '#145a28');
      drawCircle(ctx, r); ctx.fill();
      // Stripes
      for (let i=-4; i<=4; i++) {
        if (i===0) continue;
        ctx.strokeStyle = i%2===0 ? '#1e6b32' : '#2d9d4a';
        ctx.lineWidth = r*0.1; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(i*r*0.22, -r*0.9);
        ctx.quadraticCurveTo(i*r*0.12, 0, i*r*0.22, r*0.9); ctx.stroke();
      }
      specular(ctx, r, -r*0.2, -r*0.25, r*0.15);
    },
    drawCut(ctx, r, side) {
      const s = side==='left'?1:-1;
      ctx.fillStyle = '#1a5c2a';
      ctx.beginPath(); ctx.arc(0,0,r, Math.PI*0.5, Math.PI*1.5, side==='right'); ctx.fill();
      // White rind
      ctx.fillStyle = '#e8f5d8'; ctx.fillRect(s*r*0.72, -r*0.88, r*0.12, r*1.76);
      // Red flesh
      const fg = ctx.createLinearGradient(s*r*0.6,0,s*r*0.05,0);
      fg.addColorStop(0,'#e8302a'); fg.addColorStop(1,'#ff6b6b');
      ctx.fillStyle = fg; ctx.fillRect(s*r*0.25, -r*0.85, r*0.47, r*1.7);
      // Seeds
      for (let sy=-r*0.45; sy<r*0.5; sy+=r*0.22) {
        for (let sx=-r*0.12; sx<r*0.15; sx+=r*0.16) {
          ctx.fillStyle = '#1a1a1a'; ctx.beginPath();
          ctx.ellipse(s*(r*0.3+sx), sy, r*0.038, r*0.055, 0.3, 0, Math.PI*2); ctx.fill();
        }
      }
    }
  },
  { // 3 Lemon
    color: '#f1c40f', flesh: '#fffde0', juice: '#ffe082',
    draw(ctx, r) {
      ctx.save(); ctx.scale(0.82, 1.0);
      ctx.fillStyle = sphereGrad(ctx, r, '#f5d420', '#fff176', '#b8960a');
      drawCircle(ctx, r); ctx.fill();
      // Pores
      for (let i=0; i<20; i++) {
        const a=rand(0,Math.PI*2), d=rand(r*0.3,r*0.85);
        ctx.fillStyle = 'rgba(180,150,20,0.12)';
        ctx.beginPath(); ctx.arc(Math.cos(a)*d, Math.sin(a)*d, r*0.02, 0, Math.PI*2); ctx.fill();
      }
      specular(ctx, r);
      ctx.fillStyle = '#b8960a'; ctx.beginPath(); ctx.arc(0, -r*0.88, r*0.07, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, r*0.88, r*0.07, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    },
    drawCut(ctx, r, side) {
      const s = side==='left'?1:-1;
      ctx.save(); ctx.scale(0.82, 1.0);
      ctx.fillStyle = sphereGrad(ctx, r, '#f1c40f', '#f5d420', '#9a8008');
      ctx.beginPath(); ctx.arc(0,0,r, Math.PI*0.5, Math.PI*1.5, side==='right'); ctx.fill();
      ctx.fillStyle = '#fffef5'; ctx.fillRect(s*r*0.7, -r*0.88, r*0.3, r*1.76);
      for (let i=-2; i<=2; i++) {
        ctx.strokeStyle = 'rgba(240,230,180,0.5)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(s*r*0.1,i*r*0.3); ctx.lineTo(s*r*0.7,i*r*0.4); ctx.stroke();
      }
      ctx.restore();
    }
  },
  { // 4 Kiwi
    color: '#8B6914', flesh: '#7ec850', juice: '#a5d6a7',
    draw(ctx, r) {
      ctx.fillStyle = sphereGrad(ctx, r, '#9b7820', '#b8962a', '#5a3a0a');
      drawCircle(ctx, r); ctx.fill();
      // Fuzz
      for (let i=0; i<35; i++) {
        const a=rand(0,Math.PI*2), sr=r*0.84, er=sr+rand(2,r*0.12);
        ctx.strokeStyle = `rgba(120,80,20,${rand(0.15,0.35)})`; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*sr,Math.sin(a)*sr); ctx.lineTo(Math.cos(a)*er,Math.sin(a)*er); ctx.stroke();
      }
      specular(ctx, r, -r*0.15, -r*0.2, r*0.08);
    },
    drawCut(ctx, r, side) {
      const s = side==='left'?1:-1;
      ctx.fillStyle = '#7a5510';
      ctx.beginPath(); ctx.arc(0,0,r, Math.PI*0.5, Math.PI*1.5, side==='right'); ctx.fill();
      ctx.fillStyle = '#5a3a0a'; ctx.fillRect(s*r*0.82, -r*0.86, r*0.07, r*1.72);
      ctx.fillStyle = '#7ec850'; ctx.fillRect(s*r*0.35, -r*0.82, r*0.47, r*1.64);
      // Highlight on flesh
      ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(s*r*0.5, -r*0.82, r*0.15, r*1.64);
      // White center
      ctx.fillStyle = '#f0f8e0'; ctx.beginPath();
      ctx.ellipse(s*r*0.45, 0, r*0.1, r*0.18, 0, 0, Math.PI*2); ctx.fill();
      // Seed ring
      for (let i=0; i<12; i++) {
        const a=i/12*Math.PI*2;
        ctx.fillStyle = '#1a1a1a'; ctx.beginPath();
        ctx.arc(s*r*0.45+Math.cos(a)*r*0.12, Math.sin(a)*r*0.2, r*0.025, 0, Math.PI*2); ctx.fill();
      }
    }
  },
  { // 5 Strawberry
    color: '#e8302a', flesh: '#ffcccc', juice: '#ff4466',
    draw(ctx, r) {
      // Tapered body
      ctx.fillStyle = '#d42a25'; ctx.beginPath();
      ctx.moveTo(-r*0.95, -r*0.55); ctx.bezierCurveTo(-r*1.05, r*0.4, -r*0.4, r*1.05, 0, r*1.08);
      ctx.bezierCurveTo(r*0.4, r*1.05, r*1.05, r*0.4, r*0.95, -r*0.55); ctx.closePath(); ctx.fill();
      // 3D overlay
      const hg = ctx.createLinearGradient(-r*0.5, 0, r*0.5, 0);
      hg.addColorStop(0,'rgba(255,255,255,0.12)'); hg.addColorStop(0.4,'rgba(255,255,255,0)');
      hg.addColorStop(0.6,'rgba(0,0,0,0.05)'); hg.addColorStop(1,'rgba(0,0,0,0.2)');
      ctx.fillStyle = hg; ctx.beginPath();
      ctx.moveTo(-r*0.95, -r*0.55); ctx.bezierCurveTo(-r*1.05, r*0.4, -r*0.4, r*1.05, 0, r*1.08);
      ctx.bezierCurveTo(r*0.4, r*1.05, r*1.05, r*0.4, r*0.95, -r*0.55); ctx.closePath(); ctx.fill();
      // Seed dimples
      for (let sy=-r*0.15; sy<r*0.85; sy+=r*0.16) {
        const w = 0.3 + sy/r*0.6;
        for (let sx=-r*w; sx<=r*w; sx+=r*0.2) {
          ctx.fillStyle = '#ffeaa7'; ctx.beginPath();
          ctx.arc(sx+rand(-0.5,0.5), sy+rand(-0.5,0.5), r*0.033, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.beginPath();
          ctx.arc(sx+rand(-0.3,0.3)+r*0.02, sy+rand(-0.3,0.3)+r*0.02, r*0.033, 0, Math.PI*2); ctx.fill();
        }
      }
      // Green cap
      ctx.fillStyle = '#3cb043'; ctx.beginPath();
      ctx.ellipse(0, -r*0.6, r*0.55, r*0.16, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-r*0.4, -r*0.6); ctx.lineTo(0, -r*0.85);
      ctx.lineTo(r*0.4, -r*0.6); ctx.fill();
      ctx.fillStyle = '#2a8030'; ctx.beginPath(); ctx.arc(0, -r*0.78, r*0.06, 0, Math.PI*2); ctx.fill();
    },
    drawCut(ctx, r, side) {
      const s = side==='left'?1:-1;
      ctx.fillStyle = '#d42a25'; ctx.beginPath();
      ctx.moveTo(0, -r*0.55); ctx.bezierCurveTo(-r*0.8, r*0.4, -r*0.3, r*1.05, 0, r*1.08);
      ctx.lineTo(0, -r*0.55); ctx.fill();
      // Flesh
      ctx.fillStyle = '#ffcccc'; ctx.fillRect(s*r*0.35, -r*0.85, r*0.35, r*1.7);
      const fg = ctx.createLinearGradient(s*r*0.6,0,s*r*0.35,0);
      fg.addColorStop(0,'#d42a25'); fg.addColorStop(1,'#ffcccc');
      ctx.fillStyle = fg; ctx.fillRect(s*r*0.4, -r*0.85, r*0.2, r*1.7);
    }
  },
  { // 6 Peach
    color: '#ffb39c', flesh: '#ffe0b2', juice: '#ffccbc',
    draw(ctx, r) {
      ctx.fillStyle = sphereGrad(ctx, r, '#f5a085', '#ffccb8', '#d4856c');
      drawCircle(ctx, r); ctx.fill();
      // Blush
      const bg = ctx.createRadialGradient(r*0.35, 0, r*0.05, 0, 0, r);
      bg.addColorStop(0,'rgba(255,80,60,0.3)'); bg.addColorStop(1,'rgba(255,80,60,0)');
      ctx.fillStyle = bg; drawCircle(ctx, r); ctx.fill();
      // Cleft
      ctx.strokeStyle = 'rgba(160,70,50,0.25)'; ctx.lineWidth = r*0.04;
      ctx.beginPath(); ctx.moveTo(0, -r*0.75); ctx.quadraticCurveTo(r*0.12, 0, 0, r*0.75); ctx.stroke();
      specular(ctx, r, -r*0.22, -r*0.28, r*0.13);
      ctx.strokeStyle = '#5a3a1a'; ctx.lineWidth = r*0.05; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0, -r*0.78); ctx.lineTo(0, -r*0.95); ctx.stroke();
    },
    drawCut(ctx, r, side) {
      const s = side==='left'?1:-1;
      ctx.fillStyle = sphereGrad(ctx, r, '#f5a085', '#ffccb8', '#c07055');
      ctx.beginPath(); ctx.arc(0,0,r, Math.PI*0.5, Math.PI*1.5, side==='right'); ctx.fill();
      const fg = ctx.createLinearGradient(s*r,0,s*r*0.65,0);
      fg.addColorStop(0,'#ffe8cc'); fg.addColorStop(1,'#ffcc99');
      ctx.fillStyle = fg; ctx.fillRect(s*r*0.65, -r*0.88, r*0.35, r*1.76);
      // Pit
      ctx.fillStyle = '#6b3a2a'; ctx.beginPath();
      ctx.ellipse(s*r*0.38, 0, r*0.13, r*0.17, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#8b5a3a'; ctx.beginPath();
      ctx.ellipse(s*r*0.38, -r*0.02, r*0.07, r*0.1, 0.3, 0, Math.PI*2); ctx.fill();
    }
  },
];

// ─── State ────────────────────────────
const S = {
  screen: 'menu', // menu | playing | endless | levelDone | gameOver
  score: 0,
  bestEndless: 0,
  lives: 3,
  level: 1,
  combo: 0,
  maxCombo: 0,
  objects: [],
  particles: [],
  halves: [],
  popups: [],
  blade: [],          // {x, y, t}
  isTouching: false,
  shakeX: 0,
  shakeY: 0,
  shakeDur: 0,
  spawnTimer: 0,
  spawnWait: 0,
  waveCount: 0,
  levelTarget: 0,
  bombChance: 0,
  bgStars: [],
  comboChain: false,
  chainTimer: 0,
};

// ─── Helpers ──────────────────────────
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

function ptSegDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const len2 = dx * dx + dy * dy;
  if (len2 === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / len2;
  t = clamp(t, 0, 1);
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function initBgStars() {
  S.bgStars = [];
  for (let i = 0; i < 100; i++) {
    S.bgStars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.5 + 0.5, speed: Math.random() * 0.3 + 0.1 });
  }
}

// ─── Object Spawning ──────────────────
function spawnWave() {
  if (S.screen !== 'playing' && S.screen !== 'endless') return;
  const count = randInt(1, Math.min(5, 1 + Math.floor(S.level / 2)));
  for (let i = 0; i < count; i++) {
    const isBomb = Math.random() < S.bombChance;
    const x = rand(W * 0.1, W * 0.9);
    const vy = rand(-H * 1.35, -H * 0.85);
    const vx = rand(-100, 100);
    if (isBomb) {
      S.objects.push({
        type: 'bomb', x, y: H + 60, vx, vy,
        r: Math.min(60, W * 0.078), rotation: 0, rotSpeed: rand(-2, 2),
      });
    } else {
      const fi = randInt(0, FRUITS.length - 1);
      S.objects.push({
        type: 'fruit', x, y: H + 60, vx, vy,
        r: Math.min(58, W * 0.075), rotation: 0, rotSpeed: rand(-2, 2),
        fruitIndex: fi,
      });
    }
  }
}

// ─── Particle / Popup ─────────────────
function burstJuice(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(150, 550);
    S.particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: rand(0.4, 1.0), maxLife: 1.0, color, size: rand(4, 10),
    });
  }
}

function burstBomb(x, y) {
  // Large explosion particles
  for (let i = 0; i < 50; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(200, 700);
    const colors = ['#ff2200', '#ff6600', '#ffaa00', '#ffdd00', '#444', '#222', '#fff'];
    S.particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: rand(0.5, 1.5), maxLife: 1.5, color: colors[randInt(0, colors.length - 1)], size: rand(5, 16),
    });
  }
  // Smoke ring particles
  for (let i = 0; i < 20; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(80, 200);
    S.particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: rand(0.8, 2.0), maxLife: 2.0, color: '#555', size: rand(10, 25),
    });
  }
  // Flash ring
  S.particles.push({
    x, y, vx: 0, vy: 0,
    life: 0.5, maxLife: 0.5, color: '#fff', size: 10, isFlash: true,
  });
}

function addPopup(x, y, text, color) {
  S.popups.push({ x, y, text, color, life: 0.8, maxLife: 0.8, vy: -120 });
}

function spawnHalves(x, y, fruitIndex, r) {
  const angle = rand(-0.4, 0.4) - Math.PI / 2;
  const speed = rand(180, 300);
  S.halves.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 120, fruitIndex, r, half: 'left', rotation: 0, rotSpeed: rand(-6, -3), life: 1.0, maxLife: 1.0 });
  S.halves.push({ x, y, vx: Math.cos(angle + Math.PI) * speed, vy: Math.sin(angle + Math.PI) * speed - 120, fruitIndex, r, half: 'right', rotation: 0, rotSpeed: rand(3, 6), life: 1.0, maxLife: 1.0 });
}

// ─── Slice Logic ──────────────────────
function sliceObject(obj, bladePt) {
  if (obj.type === 'fruit') {
    S.combo++;
    if (S.combo > S.maxCombo) S.maxCombo = S.combo;
    const pts = S.combo;
    S.score += pts;
    const ft = FRUITS[obj.fruitIndex];
    burstJuice(obj.x, obj.y, ft.juice, 22);
    spawnHalves(obj.x, obj.y, obj.fruitIndex, obj.r);
    addPopup(obj.x, obj.y, pts > 1 ? `+${pts} x${S.combo}` : '+1', ft.color);
    if (S.combo >= 3) sfxCombo(Math.min(S.combo, 8));
    else sfxSlice();
    S.chainTimer = 0.85;
    S.comboChain = true;
  } else if (obj.type === 'bomb') {
    S.lives--;
    S.shakeDur = 0.5;
    burstBomb(obj.x, obj.y);
    addPopup(obj.x, obj.y, '💥💥', '#ff0000');
    sfxBomb();
    S.combo = 0;
    S.comboChain = false;
  }
}

// ─── Update ───────────────────────────
function update(dt) {
  dt = Math.min(dt, 0.1);
  const active = S.screen === 'playing' || S.screen === 'endless';

  // Shake
  if (S.shakeDur > 0) {
    S.shakeDur -= dt;
    const intensity = S.shakeDur * 30;
    S.shakeX = (Math.random() - 0.5) * intensity;
    S.shakeY = (Math.random() - 0.5) * intensity;
  } else {
    S.shakeX = 0;
    S.shakeY = 0;
  }

  // Combo chain timer
  if (S.comboChain) {
    S.chainTimer -= dt;
    if (S.chainTimer <= 0) {
      S.combo = 0;
      S.comboChain = false;
    }
  }

  // Spawning
  if (active) {
    S.spawnTimer -= dt;
    if (S.spawnTimer <= 0) {
      S.spawnTimer = S.spawnWait + rand(-0.15, 0.15);
      spawnWave();
      S.waveCount++;
      if (S.screen === 'endless') {
        S.bombChance = Math.min(0.08 + S.waveCount * 0.003, 0.5);
        S.spawnWait = Math.max(0.25, 0.8 - S.waveCount * 0.008);
      }
    }
  }

  // Prune old blade points
  const now = performance.now() / 1000;
  S.blade = S.blade.filter(p => now - p.t < 0.12);

  // Collision: blade vs objects (only when active)
  if (active) {
    const toRemove = [];
    for (let i = S.objects.length - 1; i >= 0; i--) {
      const obj = S.objects[i];
      let hit = false;
      for (let j = 1; j < S.blade.length; j++) {
        const a = S.blade[j - 1], b = S.blade[j];
        const d = ptSegDist(obj.x, obj.y, a.x, a.y, b.x, b.y);
        if (d < obj.r * 1.1) {
          hit = true;
          sliceObject(obj, { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });
          break;
        }
      }
      if (hit) toRemove.push(i);
    }
    for (const i of toRemove) S.objects.splice(i, 1);
  }

  // Update objects
  const gravity = H * 1.3;
  for (let i = S.objects.length - 1; i >= 0; i--) {
    const obj = S.objects[i];
    obj.vy += gravity * dt;
    obj.x += obj.vx * dt;
    obj.y += obj.vy * dt;
    obj.rotation += obj.rotSpeed * dt;
    if (obj.y > H + 100) S.objects.splice(i, 1);
  }

  // Update halves
  for (let i = S.halves.length - 1; i >= 0; i--) {
    const h = S.halves[i];
    h.vy += gravity * dt;
    h.x += h.vx * dt;
    h.y += h.vy * dt;
    h.rotation += h.rotSpeed * dt;
    h.life -= dt;
    if (h.life <= 0) S.halves.splice(i, 1);
  }

  // Update particles
  for (let i = S.particles.length - 1; i >= 0; i--) {
    const p = S.particles[i];
    p.vy += gravity * 0.7 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) S.particles.splice(i, 1);
  }

  // Update popups
  for (let i = S.popups.length - 1; i >= 0; i--) {
    const p = S.popups[i];
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) S.popups.splice(i, 1);
  }

  // Level check
  if (S.screen === 'playing' && S.score >= S.levelTarget) {
    S.screen = 'levelDone';
    sfxLevelUp();
  }

  // Game over check
  if ((S.screen === 'playing' || S.screen === 'endless') && S.lives <= 0) {
    S.screen = 'gameOver';
    sfxGameOver();
    if (S.bestEndless < S.score) {
      S.bestEndless = S.score;
      localStorage.setItem('fn_best_endless', S.score);
    }
  }

  // Background stars
  for (const star of S.bgStars) {
    star.y += star.speed;
    if (star.y > H + 5) { star.y = -5; star.x = Math.random() * W; }
  }
}

// ─── Render ───────────────────────────
function drawBg() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#0a1628');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const star of S.bgStars) {
    const alpha = 0.3 + Math.sin(performance.now() / 2000 + star.x) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBlade() {
  if (S.blade.length < 2) return;
  const now = performance.now() / 1000;
  for (let i = 1; i < S.blade.length; i++) {
    const a = S.blade[i - 1], b = S.blade[i];
    const age = (now - b.t) / 0.12;
    if (age >= 1) continue;
    const alpha = 1 - age;
    const width = 5 * alpha + 1;
    ctx.strokeStyle = `rgba(220,240,255,${alpha * 0.9})`;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.shadowColor = `rgba(200,220,255,${alpha * 0.7})`;
    ctx.shadowBlur = 12 * alpha;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Inner bright line
    if (width > 2) {
      ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.6})`;
      ctx.lineWidth = width * 0.4;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
  }
}

function drawObject(obj) {
  ctx.save();
  ctx.translate(obj.x, obj.y);
  ctx.rotate(obj.rotation);

  if (obj.type === 'bomb') {
    // Bomb body
    const grad = ctx.createRadialGradient(-obj.r*0.25, -obj.r*0.25, obj.r*0.1, 0, 0, obj.r);
    grad.addColorStop(0, '#555');
    grad.addColorStop(0.5, '#2a2a2a');
    grad.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0, 0, obj.r, 0, Math.PI * 2); ctx.fill();
    // Highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, obj.r - 2, 0, Math.PI * 2); ctx.stroke();
    // Danger stripe
    ctx.strokeStyle = 'rgba(255,50,20,0.35)';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, obj.r * 0.65, -0.3, 2.0); ctx.stroke();
    // Fuse
    ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(obj.r * 0.45, -obj.r * 0.65);
    ctx.quadraticCurveTo(obj.r * 0.85, -obj.r * 1.2, obj.r * 0.25, -obj.r * 1.05);
    ctx.stroke();
    ctx.strokeStyle = '#c4953a'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(obj.r * 0.25, -obj.r * 1.05);
    ctx.lineTo(obj.r * 0.2, -obj.r * 1.15);
    ctx.stroke();
    // Spark
    const sparkAlpha = 0.4 + Math.sin(performance.now() / 80) * 0.6;
    ctx.fillStyle = `rgba(255,220,80,${sparkAlpha})`;
    ctx.shadowColor = `rgba(255,180,0,${sparkAlpha})`;
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(obj.r * 0.2, -obj.r * 1.15, 6, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    for (let s = 0; s < 3; s++) {
      ctx.fillStyle = `rgba(255,200,50,${sparkAlpha * 0.7})`;
      ctx.beginPath();
      ctx.arc(obj.r * 0.2 + rand(-6, 6), -obj.r * 1.15 + rand(-6, 6), 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Bomb emoji (centered, large)
    ctx.font = `${obj.r * 1.9}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('💣', 0, 0);
  } else {
    FRUITS[obj.fruitIndex].draw(ctx, obj.r);
  }

  ctx.restore();
}

function drawHalf(h) {
  ctx.save();
  ctx.translate(h.x, h.y);
  ctx.rotate(h.rotation);
  const alpha = Math.max(0, h.life / h.maxLife);
  ctx.globalAlpha = alpha;
  FRUITS[h.fruitIndex].drawCut(ctx, h.r || 30, h.half);
  ctx.restore();
}

function drawHUD() {
  const pad = Math.max(8, W * 0.025);
  const fs = Math.max(14, W * 0.04);
  const smallFs = fs * 0.7;
  const heartSize = Math.max(18, W * 0.05);
  const barH = Math.max(36, fs * 1.9);

  // ── Top bar background ──
  const barW = W - pad * 2;
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.roundRect(pad, pad, barW, barH, 10);
  ctx.fill();

  // ── Left: Score ──
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${fs}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const leftX = pad + 10;
  const midY = pad + barH / 2;
  ctx.fillText(`${S.score}`, leftX, midY - 1);
  ctx.fillStyle = '#aaa';
  ctx.font = `${smallFs}px "Segoe UI", sans-serif`;
  const scoreW = ctx.measureText(`${S.score}`).width;
  if (S.screen === 'playing') {
    ctx.fillText(`/ ${S.levelTarget}`, leftX + scoreW + 4, midY);
  }

  // ── Right: Hearts ──
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  const rightX = W - pad - 8;
  for (let i = 0; i < 3; i++) {
    ctx.font = `${heartSize}px sans-serif`;
    ctx.fillText(i < S.lives ? '❤️' : '🖤', rightX - (2 - i) * (heartSize + 4), midY);
  }
  const heartsLeftEdge = rightX - 2 * (heartSize + 4) - heartSize;

  // ── Center: Level / Mode ──
  const centerX = (leftX + scoreW + 60 + heartsLeftEdge) / 2;
  if (S.screen === 'playing') {
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${fs}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`第 ${S.level} 关`, centerX, midY);
  } else if (S.screen === 'endless') {
    ctx.fillStyle = '#ff6b6b';
    ctx.font = `bold ${fs}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('无尽模式', centerX, midY);
  }

  // ── Combo display (below bar) ──
  if (S.comboChain && S.combo >= 2) {
    const comboAlpha = clamp(S.chainTimer / 0.5, 0, 1);
    ctx.fillStyle = `rgba(255,215,0,${comboAlpha})`;
    ctx.font = `bold ${fs * 1.3}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(`${S.combo} 连击!`, W / 2, pad + barH + fs * 1.1);
  }

  // ── Best score (endless, below hearts) ──
  if (S.screen === 'endless') {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${smallFs}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText(`最高: ${S.bestEndless}`, rightX, pad + barH + smallFs * 1.2);
  }
}

function drawPopups() {
  for (const p of S.popups) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    const scale = 1 + (1 - alpha) * 0.3;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = `bold ${Math.max(18, W * 0.04)}px "Segoe UI", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.text, 0, 0);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of S.particles) {
    const alpha = clamp(p.life / p.maxLife, 0, 1);
    if (p.isFlash) {
      // Expanding flash ring
      const progress = 1 - alpha;
      const ringR = progress * 120;
      ctx.strokeStyle = `rgba(255,200,50,${alpha * 0.8})`;
      ctx.lineWidth = 8 * alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
      ctx.stroke();
      // Inner glow
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, ringR);
      grad.addColorStop(0, `rgba(255,255,200,${alpha * 0.4})`);
      grad.addColorStop(1, 'rgba(255,100,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(p.x, p.y, ringR, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ─── Screens ──────────────────────────
const SCREENS = {}; // stores button bounds for click detection

function drawMenu() {
  drawBg();
  const titleSize = Math.max(28, W * 0.08);
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${titleSize}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🍉 水果忍者 🍉', W / 2, H * 0.22);

  const subSize = Math.max(12, W * 0.03);
  ctx.fillStyle = '#ccc';
  ctx.font = `${subSize}px "Segoe UI", sans-serif`;
  ctx.fillText('滑动屏幕切水果，小心炸弹！', W / 2, H * 0.22 + titleSize * 1.15);

  const bw = Math.min(300, W * 0.75);
  const bh = Math.max(50, H * 0.07);
  const gap = Math.max(12, H * 0.02);
  const startY = H * 0.45;
  const btnFont = Math.max(16, W * 0.04);
  const descFont = Math.max(11, W * 0.025);

  const btns = [
    { text: '🎮 闯关模式', desc: '逐关挑战，难度递增' },
    { text: '♾️ 无尽模式', desc: '三滴血，看你能走多远' },
  ];

  SCREENS.menu = [];

  btns.forEach((btn, i) => {
    const by = startY + i * (bh + gap);
    const bx = W / 2 - bw / 2;
    SCREENS.menu.push({ bx, by, bw, bh, action: i === 0 ? startLevels : startEndless });

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 14);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${btnFont}px "Segoe UI", sans-serif`;
    ctx.fillText(btn.text, W / 2, by + bh * 0.4);

    ctx.fillStyle = '#888';
    ctx.font = `${descFont}px "Segoe UI", sans-serif`;
    ctx.fillText(btn.desc, W / 2, by + bh * 0.7);
  });
}

function drawLevelDone() {
  drawBg();
  const ts = Math.max(26, W * 0.07);
  ctx.fillStyle = '#ffd700';
  ctx.font = `bold ${ts}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🎉 恭喜过关！', W / 2, H * 0.28);

  const ss = Math.max(14, W * 0.035);
  ctx.fillStyle = '#fff';
  ctx.font = `${ss}px "Segoe UI", sans-serif`;
  ctx.fillText(`第 ${S.level} 关完成  |  得分: ${S.score}  |  最大连击: ${S.maxCombo}`, W / 2, H * 0.28 + ts * 1.2);

  ctx.fillStyle = '#ccc';
  ctx.font = `${ss * 0.85}px "Segoe UI", sans-serif`;
  ctx.fillText(`下一关目标: ${S.levelTarget} 分  |  炸弹频率 ↑`, W / 2, H * 0.28 + ts * 1.2 + ss * 1.5);

  const bw = Math.min(260, W * 0.6), bh = Math.max(44, H * 0.065);
  const bx = W / 2 - bw / 2, by = H * 0.58;
  SCREENS.levelDone = { bx, by, bw, bh, action: nextLevel };

  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 12);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.max(16, W * 0.035)}px "Segoe UI", sans-serif`;
  ctx.fillText('▶ 继续下一关', W / 2, by + bh / 2 + 2);
}

function drawGameOver() {
  drawBg();
  const ts = Math.max(26, W * 0.07);
  ctx.fillStyle = '#ff4444';
  ctx.font = `bold ${ts}px "Segoe UI", sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('💔 游戏结束', W / 2, H * 0.2);

  const ss = Math.max(14, W * 0.035);
  ctx.fillStyle = '#fff';
  ctx.font = `${ss}px "Segoe UI", sans-serif`;
  ctx.fillText(`最终得分: ${S.score}  |  最高连击: ${S.maxCombo}`, W / 2, H * 0.2 + ts * 1.2);

  if (S.score > S.bestEndless && S.bestEndless > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${ss}px "Segoe UI", sans-serif`;
    ctx.fillText('🏆 新最高分！', W / 2, H * 0.2 + ts * 1.2 + ss * 1.3);
  }

  const bw = Math.min(300, W * 0.75);
  const bh = Math.max(42, H * 0.06);
  const gap = Math.max(8, H * 0.015);
  const startY = H * 0.45;

  const btns = [
    { text: '🔄 再来一局（闯关）', action: startLevels },
    { text: '♾️ 无尽模式', action: startEndless },
    { text: '🏠 返回主页', action: () => { S.screen = 'menu'; } },
  ];

  SCREENS.gameOver = [];

  btns.forEach((btn, i) => {
    const by = startY + i * (bh + gap);
    const bx = W / 2 - bw / 2;
    SCREENS.gameOver.push({ bx, by, bw, bh, action: btn.action });

    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 12);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(14, W * 0.035)}px "Segoe UI", sans-serif`;
    ctx.fillText(btn.text, W / 2, by + bh / 2 + 2);
  });
}

// ─── Input ────────────────────────────
function addBladePoint(x, y) {
  S.blade.push({ x, y, t: performance.now() / 1000 });
  if (S.blade.length > 40) S.blade.shift();
}

function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

let touchHandled = false;

canvas.addEventListener('mousedown', e => {
  if (touchHandled) return;
  S.isTouching = true;
  addBladePoint(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', e => {
  if (!S.isTouching || touchHandled) return;
  addBladePoint(e.clientX, e.clientY);
});
window.addEventListener('mouseup', () => { S.isTouching = false; });
canvas.addEventListener('mouseleave', () => { S.isTouching = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchHandled = true;
  initAudio();
  S.isTouching = true;
  const p = getPos(e);
  addBladePoint(p.x, p.y);
  handleClick(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!S.isTouching) return;
  const p = getPos(e);
  addBladePoint(p.x, p.y);
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  S.isTouching = false;
  setTimeout(() => { touchHandled = false; }, 300);
});
canvas.addEventListener('touchcancel', () => {
  S.isTouching = false;
  setTimeout(() => { touchHandled = false; }, 300);
});

canvas.addEventListener('click', e => {
  if (touchHandled) return;
  handleClick(e.clientX, e.clientY);
});

function handleClick(x, y) {
  function hit(b) { return x >= b.bx && x <= b.bx + b.bw && y >= b.by && y <= b.by + b.bh; }
  const btns = SCREENS[S.screen];
  if (!btns) return;
  if (Array.isArray(btns)) {
    for (const b of btns) { if (hit(b)) { b.action(); return; } }
  } else if (hit(btns)) {
    btns.action();
  }
}

// ─── Game Loop ────────────────────────
let lastTime = performance.now();

function gameLoop(time) {
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  update(dt);

  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(S.shakeX, S.shakeY);

  drawBg();

  // Draw halves (behind objects)
  for (const h of S.halves) drawHalf(h);

  // Draw objects
  for (const obj of S.objects) drawObject(obj);

  // Draw blade
  if (S.isTouching) drawBlade();

  // Draw effects
  drawParticles();
  drawPopups();
  drawHUD();

  ctx.restore();

  // Overlay screens
  if (S.screen === 'menu') drawMenu();
  if (S.screen === 'levelDone') drawLevelDone();
  if (S.screen === 'gameOver') drawGameOver();

  requestAnimationFrame(gameLoop);
}

// ─── Init ─────────────────────────────
initBgStars();
resize();
requestAnimationFrame(gameLoop);
</script>
